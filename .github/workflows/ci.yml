name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - chatgpt/stage2-calibration-review

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint, typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run ESLint (diagnostic)
        continue-on-error: true
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Build production application
        run: npm run build

  analytics:
    name: Python analytics tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/analytics

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/analytics/requirements.txt

      - name: Install analytics dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run analytics tests
        run: python -m pytest -q
