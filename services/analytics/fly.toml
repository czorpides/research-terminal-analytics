# Fly.io deployment config for the stateless analytics calculator.
# Only ANALYTICS_SERVICE_TOKEN is required as a secret:
#   flyctl secrets set ANALYTICS_SERVICE_TOKEN=<long-random-string>
# SUPABASE_* variables are intentionally NOT required or read.

app = "analytics-service"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVICE_VERSION = "0.2.0"
  DEPLOY_ENV = "production"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "get"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512